name: AI Implement Issue

on:
  issue_comment:
    types: [created]

concurrency:
  group: ai-implement-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  gate:
    name: Authorize and prepare
    # Only on issue comments (not PR comments) by OWNER or MEMBER.
    # The comment body is NOT evaluated here to avoid untrusted content entering
    # the expression context; the step-level regex is the authoritative /implement gate.
    if: |
      github.event.issue.pull_request == null &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
      issues: read
    outputs:
      authorized: ${{ steps.auth.outputs.authorized }}
      exists:     ${{ steps.check-existing.outputs.exists }}
      pr_url:     ${{ steps.check-existing.outputs.pr_url }}
      branch:     ${{ steps.branch.outputs.branch }}

    steps:
      - name: Check authorization
        id: auth
        env:
          AUTHOR_ASSOC: ${{ github.event.comment.author_association }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          # Cap comment body to 1000 chars before regex to guard against ReDoS on
          # pathological input; printf '%s' already prevents shell injection.
          COMMENT_BODY="${COMMENT_BODY:0:1000}"
          # Strip CRLF and NUL bytes from input before regex matching.
          COMMENT_BODY="${COMMENT_BODY//$'\r'/}"
          COMMENT_BODY="${COMMENT_BODY//$'\0'/}"
          # Require /implement at the start of a line.  Python's (?m) mode anchors ^ to
          # each line boundary reliably, regardless of how the shell expanded the env var.
          if ! printf '%s' "$COMMENT_BODY" | python3 -c "
import sys, re, os
body = sys.stdin.read()
if re.search(r'(?m)^\s*/implement(?:\s|\$)', body):
    raise SystemExit(0)
raise SystemExit(1)
"; then
            echo "authorized=false" >> "$GITHUB_OUTPUT"
            echo "/implement not found at start of line — skipping"
            exit 0
          fi
          case "$AUTHOR_ASSOC" in
            OWNER|MEMBER)
              echo "authorized=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "authorized=false" >> "$GITHUB_OUTPUT"
              echo "Commenter association '$AUTHOR_ASSOC' is not authorized — skipping"
              ;;
          esac

      - name: Check for existing AI PR
        if: steps.auth.outputs.authorized == 'true'
        id: check-existing
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          # Validate ISSUE_NUMBER is numeric before any interpolation into API/jq expressions.
          if ! printf '%s' "$ISSUE_NUMBER" | grep -qE '^[0-9]+$'; then
            echo "::error::ISSUE_NUMBER '$ISSUE_NUMBER' is not a valid integer — aborting"
            exit 1
          fi
          BRANCH_PREFIX="ai/issue-${ISSUE_NUMBER}-"
          # Pass BRANCH_PREFIX via --arg to prevent jq string-injection if ISSUE_NUMBER is
          # ever non-numeric (belt-and-suspenders after the validation above).
          EXISTING_PR=$(gh api --paginate "repos/$REPO/pulls?state=open&per_page=100" \
            --jq --arg pfx "$BRANCH_PREFIX" '.[] | select(.head.ref | startswith($pfx)) | .html_url' \
            2>/dev/null | head -1 || true)
          if [ -n "$EXISTING_PR" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "pr_url=$EXISTING_PR" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute branch name
        if: steps.auth.outputs.authorized == 'true' && steps.check-existing.outputs.exists == 'false'
        id: branch
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          SLUG=$(printf '%s' "$ISSUE_TITLE" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' \
            | sed 's/-\+/-/g' \
            | sed 's/^-\|-$//g' \
            | cut -c1-40)
          [ -z "$SLUG" ] && SLUG="untitled"
          SLUG="${SLUG%-}"
          BRANCH="ai/issue-${ISSUE_NUMBER}-${SLUG}"
          if ! printf '%s' "$BRANCH" | grep -qE '^[a-z0-9/\-]+$'; then
            echo "Computed branch name contains unexpected characters: $BRANCH"
            exit 1
          fi
          # Use EOF delimiter to prevent any CRLF injection in GITHUB_OUTPUT
          _delim="ghadelimiter_$(head -c 8 /dev/urandom | od -An -tx1 | tr -d ' \n')"
          printf 'branch<<%s\n%s\n%s\n' "$_delim" "$BRANCH" "$_delim" >> "$GITHUB_OUTPUT"

  notify-existing:
    name: Notify — existing PR found
    needs: gate
    if: needs.gate.outputs.authorized == 'true' && needs.gate.outputs.exists == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: React to command
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          gh api "repos/$REPO/issues/comments/$COMMENT_ID/reactions" \
            --method POST --field content=eyes || true

      - name: Post existing PR link
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PR_URL: ${{ needs.gate.outputs.pr_url }}
        run: |
          gh api "repos/$REPO/issues/$ISSUE_NUMBER/comments" \
            --method POST \
            --field body="An AI-generated PR already exists for this issue: $PR_URL"

  implement:
    name: Implement issue via Claude Code
    # Gate job verified authorization and confirmed no existing PR exists.
    # Write-capable GITHUB_TOKEN is only provisioned after the read-only gate passes.
    needs: gate
    if: needs.gate.outputs.authorized == 'true' && needs.gate.outputs.exists != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Re-verify gate authorization
        # Belt-and-suspenders runtime check: abort immediately if gate outputs indicate
        # this job should not have started (guards against expression-evaluation edge cases).
        env:
          AUTHORIZED: ${{ needs.gate.outputs.authorized }}
          EXISTS: ${{ needs.gate.outputs.exists }}
        run: |
          if [ "$AUTHORIZED" != "true" ] || [ "$EXISTS" = "true" ]; then
            echo "::error::Gate authorization check failed — aborting"
            exit 1
          fi

      - name: Mask long-lived PAT secret
        # Mask at job start so the value never appears in any subsequent log line.
        env:
          WENDY_PAT: ${{ secrets.WENDY_TEMPLATE_SYNC_TOKEN }}
        run: echo "::add-mask::$WENDY_PAT"

      - name: React to command
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          gh api "repos/$REPO/issues/comments/$COMMENT_ID/reactions" \
            --method POST --field content=eyes || true

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: |
          # Download tarball, verify its sha512 against hardcoded hash, then install
          # from the local file — eliminates any TOCTOU window between check and install.
          EXPECTED_INTEGRITY="sha512-nyeOyoc/pmGGRpffyPU16v5campztkynyRFcNKqD7pBvI0aPfljGVi3CizKbu7/dx1MijeE9XiQ0kHk1tmx5Gg=="
          # The hardcoded sha512 hash IS the security control — reviewed via CODEOWNERS before merge.
          # A registry cross-check against the same npm registry that served the tarball would be
          # circular: a compromised registry could return the attacker's hash for both the tarball
          # and the dist.integrity field. We rely solely on the out-of-band hardcoded hash.
          # --prefer-online forces a fresh fetch, bypassing the npm cache.
          TARBALL=$(npm pack @anthropic-ai/claude-code@2.1.150 --prefer-online 2>/dev/null | tail -1 | tr -d '\r\n')
          # Validate filename matches expected pattern — prevents path injection via malicious npm output.
          if ! printf '%s' "$TARBALL" | grep -qE '^anthropic-ai-claude-code-[0-9]+\.[0-9]+\.[0-9]+\.tgz$'; then
            echo "::error::Unexpected tarball filename format: '$TARBALL'"
            rm -f "$TARBALL" 2>/dev/null || true
            exit 1
          fi
          if [ -z "$TARBALL" ] || [ ! -f "$TARBALL" ]; then
            echo "::error::Failed to download @anthropic-ai/claude-code@2.1.150"
            exit 1
          fi
          # Restrict read access before hashing; node crypto produces canonical SRI base64.
          chmod 400 "$TARBALL"
          ACTUAL_HASH=$(node -e "
const c=require('crypto'),f=require('fs');
process.stdout.write('sha512-'+c.createHash('sha512').update(f.readFileSync(process.argv[1])).digest('base64'));
" "$TARBALL")
          if [ "$ACTUAL_HASH" != "$EXPECTED_INTEGRITY" ]; then
            echo "::error::claude-code@2.1.150 integrity mismatch — possible supply-chain compromise"
            echo "  expected: $EXPECTED_INTEGRITY"
            echo "    actual: $ACTUAL_HASH"
            rm -f "$TARBALL"
            exit 1
          fi
          npm install -g --ignore-scripts "$TARBALL"
          rm -f "$TARBALL"

      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          token: ${{ github.token }}
          fetch-depth: 0
          persist-credentials: false

      - name: Create branch
        env:
          BRANCH: ${{ needs.gate.outputs.branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

      - name: Collect issue context
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          python3 << 'PYEOF'
          import json, os, re, subprocess, pathlib

          repo = os.environ['REPO']
          issue_number = os.environ['ISSUE_NUMBER']
          runner_temp = os.environ['RUNNER_TEMP']

          import html, unicodedata

          def sanitize(text):
              """Strip content that could escape prompt delimiters or inject instructions."""
              # Decode HTML entities iteratively until stable (handles double-encoding)
              prev = None
              while prev != text:
                  prev = text
                  text = html.unescape(text)
              # NFKC normalization collapses Unicode homoglyphs (e.g. fullwidth chars)
              text = unicodedata.normalize('NFKC', text)
              # Strip Unicode direction-override, zero-width, soft-hyphen (U+00AD),
              # CGJ (U+034F), ZWJ (U+200D), Hangul filler (U+3164), tag block, BOM
              text = re.sub(r'[\u00ad\u034f\u200b-\u200f\u200d\u202a-\u202e\u2066-\u2069\u3164\ue0000-\ue007f\ufeff]', '', text)
              # Destructive fence stripping — prevents nested code-block injection
              text = re.sub(r'`{3,}', '[fence]', text)
              text = re.sub(r'~{3,}', '[fence]', text)
              # Strip ALL XML/HTML tags — broad approach prevents named-allowlist bypass
              text = re.sub(r'<[^>]{0,4000}>', '[tag]', text)
              # Block common prompt injection trigger phrases
              text = re.sub(r'(?i)ignore\s+(all\s+)?previous\s+instructions?', '[filtered]', text)
              text = re.sub(r'(?i)new\s+instructions?\s*:', '[filtered]', text)
              text = re.sub(r'(?mi)^\s*system\s*:\s*', '[filtered] ', text)
              text = re.sub(r'(?i)(disregard|forget|override)\s+(all\s+)?(previous\s+)?instructions?', '[filtered]', text)
              text = re.sub(r'(?i)(you\s+are\s+now|act\s+as|pretend\s+(to\s+be|you\s+are))', '[filtered]', text)
              # Block structured output markers (case-insensitive, allow surrounding whitespace)
              text = re.sub(r'(?i)PR_TITLE\s*:', '[PR_TITLE]', text)
              text = re.sub(r'(?i)PR_BODY_START', '[PR_BODY_START]', text)
              text = re.sub(r'(?i)PR_BODY_END', '[PR_BODY_END]', text)
              # Strip markdown link injection patterns: [text](url)
              text = re.sub(r'\[([^\]]*)\]\([^)]*\)', r'[\1]', text)
              # Strip control characters (keep newline and tab)
              text = re.sub(r'[\x00-\x08\x0b-\x0c\x0e-\x1f\x7f]', '', text)
              return text

          issue = json.loads(subprocess.check_output(
              ['gh', 'api', f'repos/{repo}/issues/{issue_number}']))
          comments_raw = json.loads(subprocess.check_output(
              ['gh', 'api', f'repos/{repo}/issues/{issue_number}/comments?per_page=100']))

          # Enforce length limits before sanitizing
          title   = sanitize(issue['title'][:200])
          body    = sanitize((issue.get('body') or '(no body)')[:10000])
          # Filter to OWNER/MEMBER only — COLLABORATORs excluded
          trusted = {'OWNER', 'MEMBER'}
          comments = '\n'.join(
              f'**{c["user"]["login"]}:** {sanitize(c["body"][:2000])}'
              for c in comments_raw
              if c.get('author_association') in trusted
          )

          # Per-run UUID sentinel: makes structured output delimiters unpredictable so
          # an attacker who controls issue content cannot forge PR_BODY_START/END markers
          # even if they achieve partial prompt injection. sanitize() strips the static
          # forms of these markers from all untrusted input.
          import uuid as _uuid
          sentinel = _uuid.uuid4().hex
          begin_marker = f'PR_BODY_START_{sentinel}'
          end_marker   = f'PR_BODY_END_{sentinel}'

          # Write sentinel to a file for the Parse PR metadata step to read
          pathlib.Path(f'{runner_temp}/sentinel.txt').write_text(sentinel)

          # Instructions go in the system prompt (trusted, separate from user data)
          system_prompt = f"""You are an engineer working on WendyOS, an embedded/edge OS and CLI tool that deploys containerised apps to IoT devices.

          Implement the GitHub issue provided in the user message by editing the relevant source files.
          Do not run git, commit, or push — the CI handles staging and committing your changes.

          When you are done, output — at the very end of your response — this exact block:

          PR_TITLE: <one-line PR title>
          {begin_marker}
          ## What this PR does
          <description>

          ## How to test
          <steps>
          {end_marker}
          """

          # Untrusted issue content is the user message only — kept separate from instructions
          user_message = f"""Issue #{issue_number}

          Title: {title}

          {body}

          Discussion:
          {comments}
          """

          pathlib.Path(f'{runner_temp}/system-prompt.txt').write_text(system_prompt)
          pathlib.Path(f'{runner_temp}/prompt.txt').write_text(user_message)
          print(f'Prompts written (system: {len(system_prompt)} chars, user: {len(user_message)} chars)')
          PYEOF

      - name: Run Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Read prompts into shell vars, then delete the files so Claude's Read
          # tool cannot access them (or any other sensitive RUNNER_TEMP content).
          # sentinel.txt is kept for the Parse PR metadata step to read.
          SYSTEM_PROMPT=$(cat "$RUNNER_TEMP/system-prompt.txt")
          USER_PROMPT=$(cat "$RUNNER_TEMP/prompt.txt")
          rm -f "$RUNNER_TEMP/system-prompt.txt" "$RUNNER_TEMP/prompt.txt"
          # Mask API key before any action that could echo it (must be first)
          echo "::add-mask::$ANTHROPIC_API_KEY"
          # Remove .git credential helpers before Claude runs
          git config --local --unset-all credential.helper 2>/dev/null || true
          # Pre-create output files with restricted permissions so no window exists
          # between Claude writing and the scrubber running with world-readable files.
          install -m 600 /dev/null "$RUNNER_TEMP/claude-output.txt"
          install -m 600 /dev/null "$RUNNER_TEMP/claude-stderr.txt"
          # Use env -i to limit Claude's visible environment to only what it needs.
          # This keeps workflow secrets out of /proc/self/environ for the claude process.
          # --allowedTools is an EXCLUSIVE allowlist — Claude Code blocks all tools not listed.
          # Write is intentionally excluded: Claude can only edit existing files, preventing
          # arbitrary file creation at attacker-influenced paths.
          # --disallowedTools provides belt-and-suspenders explicit denial for defense-in-depth.
          env -i HOME="$HOME" PATH="$PATH" \
            ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY" \
            ANTHROPIC_SYSTEM_PROMPT="$SYSTEM_PROMPT" \
            claude --print \
            --allowedTools "Edit,MultiEdit" \
            --disallowedTools "Bash,Read,Write,WebFetch,WebSearch,computer_use,LS,Glob,ListFiles,SearchFiles,ReadFile,TodoWrite,TodoRead,Agent,AskFollowupQuestion,mcp__*" \
            "$USER_PROMPT" \
            > "$RUNNER_TEMP/claude-output.txt" \
            2> "$RUNNER_TEMP/claude-stderr.txt"
          # Scrub API key from artifact files before upload (mirrors ai-pr-feedback.yml).
          # ::add-mask:: protects runner logs; this scrubs the files themselves.
          _KEY_FOR_SCRUB="$ANTHROPIC_API_KEY"
          for _sf in "$RUNNER_TEMP/claude-output.txt" "$RUNNER_TEMP/claude-stderr.txt"; do
            [ -f "$_sf" ] && [ -n "$_KEY_FOR_SCRUB" ] && \
              printf '%s' "$_KEY_FOR_SCRUB" | python3 -c \
              "import sys,pathlib; k=sys.stdin.read(); p=pathlib.Path(sys.argv[1]); p.write_text(p.read_text().replace(k,'[REDACTED]')) if k else None" \
              "$_sf"
          done
          _KEY_FOR_SCRUB=""
          unset _KEY_FOR_SCRUB
          cat "$RUNNER_TEMP/claude-output.txt"
          if [ -s "$RUNNER_TEMP/claude-stderr.txt" ]; then
            echo "--- stderr ---"
            cat "$RUNNER_TEMP/claude-stderr.txt"
          fi

      - name: Upload run artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: claude-implement-run-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/claude-output.txt
            ${{ runner.temp }}/claude-stderr.txt
          if-no-files-found: ignore
          retention-days: 1

      - name: Commit any uncommitted changes
        id: commit
        run: |
          # Block hook injection BEFORE staging: non-sample hook files are unexpected on a fresh runner
          HOOK_FILES=$(find .git/hooks -maxdepth 1 -type f -not -name '*.sample' 2>/dev/null | head -5 || true)
          if [ -n "$HOOK_FILES" ]; then
            echo "::error::Unexpected hook files in .git/hooks/ — aborting:"
            echo "$HOOK_FILES"
            exit 1
          fi
          # PRE-STAGE path validation: check both modified and untracked files BEFORE git add.
          # This mirrors ai-pr-feedback.yml's pre-stage check and ensures Write-created files
          # are validated before they enter the git index.
          while IFS= read -r -d '' f; do
            if printf '%s' "$f" | LC_ALL=C grep -q '[^ -~]'; then
              echo "::error::AI created/modified file with non-ASCII path: $f"
              exit 1
            fi
            if printf '%s' "$f" | grep -qE '^(\.github/|CODEOWNERS|SECURITY\.md|security/|.*\.(pem|key|p12|pfx))'; then
              echo "::error::AI created/modified protected file: $f"
              exit 1
            fi
            if ! printf '%s' "$f" | grep -qE '^(go/|swift/|Sources/|Tests/|tests/|docs/|Documentation/|Examples/)'; then
              echo "::error::AI created/modified file outside allowed directories: $f"
              exit 1
            fi
          done < <({ git diff -z --name-only; git ls-files -z --others --exclude-standard; } 2>/dev/null)
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Block AI from modifying CI/security configuration files
          # Use -z (NUL-delimited) to prevent embedded-newline bypass in filenames
          while IFS= read -r -d '' f; do
            # Reject non-ASCII paths to prevent Unicode homoglyph bypass attacks
            if printf '%s' "$f" | LC_ALL=C grep -q '[^ -~]'; then
              echo "::error::AI modified file with non-ASCII path: $f"
              git reset HEAD
              exit 1
            fi
            if printf '%s' "$f" | grep -qE '^(\.github/|CODEOWNERS|SECURITY\.md|security/|.*\.(pem|key|p12|pfx))'; then
              echo "::error::AI modified protected file: $f"
              git reset HEAD
              exit 1
            fi
          done < <(git diff --cached -z --name-only)
          # Block any staged symlinks (check git index directly; mode 120000 = symlink)
          SYMLINKS=$(git ls-files -s | awk '$1 ~ /^120/ {print $4}' || true)
          if [ -n "$SYMLINKS" ]; then
            echo "::error::AI staged symlinks — aborting commit:"
            echo "$SYMLINKS"
            git reset HEAD
            exit 1
          fi
          # Allowlist: only permit writes to known source directories
          # Use -z (NUL-delimited) to prevent embedded-newline bypass in filenames
          while IFS= read -r -d '' f; do
            if ! printf '%s' "$f" | grep -qE '^(go/|swift/|Sources/|Tests/|tests/|docs/|Documentation/|Examples/)'; then
              echo "::error::AI modified file outside allowed directories: $f"
              git reset HEAD
              exit 1
            fi
          done < <(git diff --cached -z --name-only)
          # Log what changed for audit trail
          echo "### AI-modified files" >> "$GITHUB_STEP_SUMMARY"
          git diff --cached --stat | head -200 >> "$GITHUB_STEP_SUMMARY"
          # Exec-pattern scan: block AI-introduced subprocess/exec calls in source files.
          # Scans staged diff (pre-commit) to mirror the pre-push validation in ai-pr-feedback.yml.
          EXEC_PATTERNS=$(git diff --cached -- '*.go' '*.swift' 2>/dev/null \
            | grep -E '^\+.*(exec\.(Command|Cmd|LookPath)|syscall\.Exec|os\.StartProcess)' \
            | head -5 || true)
          if [ -n "$EXEC_PATTERNS" ]; then
            echo "::error::AI-modified source files introduce exec/subprocess calls — aborting:"
            echo "$EXEC_PATTERNS"
            git reset HEAD
            exit 1
          fi
          git commit -m "chore: implement issue via Claude Code (run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Push branch
        if: steps.commit.outputs.changed == 'true'
        id: push
        env:
          # WENDY_TEMPLATE_SYNC_TOKEN is a fine-grained PAT scoped to only
          # 'contents: write' on this repository (no other repos or permissions).
          # GITHUB_TOKEN cannot be used for push because pushes made by
          # GITHUB_TOKEN do not trigger subsequent workflow runs (CI).
          TOKEN: ${{ secrets.WENDY_TEMPLATE_SYNC_TOKEN }}
          BRANCH: ${{ needs.gate.outputs.branch }}
        run: |
          echo "::add-mask::$TOKEN"
          PUSH_TOKEN="$TOKEN"
          unset TOKEN
          # Re-validate branch name at push time (belt-and-suspenders; gate also validates).
          if ! printf '%s' "$BRANCH" | grep -qE '^ai/issue-[0-9]+(-[a-z0-9-]+)?(-[0-9]{14})?$'; then
            echo "::error::BRANCH '$BRANCH' does not match expected ai/issue-* pattern — aborting push"
            exit 1
          fi
          # Use env -i to isolate the push subprocess so GIT_PUSH_TOKEN is not
          # inherited by unrelated child processes.  Token is never in the URL.
          # mktemp creates a randomly-named file; chmod 700 before writing prevents
          # other processes from reading the token even during the push window.
          ASKPASS_FILE=$(mktemp "$RUNNER_TEMP/askpass-XXXXXX.sh")
          chmod 700 "$ASKPASS_FILE"
          trap 'rm -f "$ASKPASS_FILE"' EXIT
          printf '#!/bin/sh\nprintf "%%s" "${GIT_PUSH_TOKEN}"\n' > "$ASKPASS_FILE"
          # If a prior AI run's branch still exists remotely (PR closed/merged but branch
          # not deleted), append a short timestamp to avoid a non-fast-forward push failure.
          if env -i HOME="$HOME" PATH="$PATH" \
               GIT_ASKPASS="$ASKPASS_FILE" GIT_PUSH_TOKEN="$PUSH_TOKEN" \
               git ls-remote --exit-code --heads \
               "https://github.com/${GITHUB_REPOSITORY}.git" "$BRANCH" > /dev/null 2>&1; then
            echo "::warning::Remote branch '$BRANCH' already exists — appending timestamp to avoid conflict"
            BRANCH="${BRANCH}-$(date +%Y%m%d%H%M%S)"
          fi
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          env -i HOME="$HOME" PATH="$PATH" \
            GIT_ASKPASS="$ASKPASS_FILE" GIT_PUSH_TOKEN="$PUSH_TOKEN" \
            git push --no-force \
            "https://github.com/${GITHUB_REPOSITORY}.git" \
            "${BRANCH}"
          rm -f "$ASKPASS_FILE"

      - name: Parse PR metadata
        if: steps.commit.outputs.changed == 'true'
        id: pr-meta
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          python3 << 'PYEOF'
          import html, os, re, unicodedata

          def sanitize_output(text):
              """Sanitize LLM output before using it in shell or API calls."""
              # HTML-unescape iteratively (handles double-encoding)
              prev = None
              while prev != text:
                  prev = text
                  text = html.unescape(text)
              text = unicodedata.normalize('NFKC', text)
              text = re.sub(r'[\u00ad\u034f\u200b-\u200f\u200d\u202a-\u202e\u2066-\u2069\u3164\ue0000-\ue007f\ufeff]', '', text)
              text = re.sub(r'`{3,}', '[fence]', text)
              text = re.sub(r'~{3,}', '[fence]', text)
              text = re.sub(r'<[^>]{0,4000}>', '[tag]', text)
              # Strip @mention injection (could cause unwanted GitHub notifications)
              text = re.sub(r'@([A-Za-z0-9_-]+)', r'[\1]', text)
              # Strip control characters (keep newline and tab)
              text = re.sub(r'[\x00-\x08\x0b-\x0c\x0e-\x1f\x7f]', '', text)
              return text

          issue_number = os.environ['ISSUE_NUMBER']
          runner_temp = os.environ['RUNNER_TEMP']

          with open(f'{runner_temp}/claude-output.txt') as f:
              output = f.read()

          # Read the per-run sentinel to use the unpredictable delimiters that were
          # embedded in the system prompt. Static PR_BODY_START/END are sanitized
          # out of issue content, but using a UUID sentinel provides defense-in-depth.
          sentinel_path = f'{runner_temp}/sentinel.txt'
          sentinel = open(sentinel_path).read().strip() if os.path.exists(sentinel_path) else ''
          if sentinel:
              begin_marker = f'PR_BODY_START_{sentinel}'
              end_marker   = f'PR_BODY_END_{sentinel}'
          else:
              begin_marker = 'PR_BODY_START'
              end_marker   = 'PR_BODY_END'

          # Extract PR_TITLE line
          title_match = re.search(r'^PR_TITLE:\s*(.+)$', output, re.MULTILINE)
          pr_title = title_match.group(1).strip() if title_match else ''
          pr_title = sanitize_output(pr_title)[:72]  # GitHub title limit

          # Extract PR_BODY between per-run sentinel markers
          body_match = re.search(
              rf'^{re.escape(begin_marker)}\s*\n(.*?)\n?{re.escape(end_marker)}',
              output, re.MULTILINE | re.DOTALL
          )
          pr_body = body_match.group(1).strip() if body_match else ''
          pr_body = sanitize_output(pr_body)[:10000]

          if not pr_title:
              pr_title = f'feat: implement issue #{issue_number}'
          if not pr_body:
              pr_body = f'Implements #{issue_number}.'

          with open(f'{runner_temp}/pr-title.txt', 'w') as f:
              f.write(pr_title)
          with open(f'{runner_temp}/pr-body.txt', 'w') as f:
              f.write(pr_body)

          print(f'PR title ({len(pr_title)} chars): {pr_title[:80]}')
          PYEOF

      - name: Create PR
        if: steps.commit.outputs.changed == 'true'
        id: create-pr
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ steps.push.outputs.branch }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          PR_URL=$(gh pr create \
            --repo "$REPO" \
            --head "$BRANCH" \
            --base main \
            --title "$(cat "$RUNNER_TEMP/pr-title.txt")" \
            --body "$(cat "$RUNNER_TEMP/pr-body.txt")" \
            --label "ai-generated")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Comment on issue
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PR_URL: ${{ steps.create-pr.outputs.pr_url }}
        run: |
          gh api "repos/$REPO/issues/$ISSUE_NUMBER/comments" \
            --method POST \
            --field body="I've opened a PR to implement this issue: $PR_URL"
