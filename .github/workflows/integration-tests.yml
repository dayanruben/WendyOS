name: Hardware Integration Tests

on:
  workflow_dispatch:
    inputs:
      hostname:
        description: 'Device hostname (empty = auto-discover via mDNS)'
        required: false
        default: ''
      tests:
        description: 'Comma-separated test names (empty = all applicable)'
        required: false
        default: ''
      jobs:
        description: 'Jobs to run: all, discover, integration (default: all)'
        required: false
        default: 'all'
      platform:
        description: 'Platform to run integration tests on: all, macos, linux (default: all)'
        required: false
        default: 'all'
  workflow_call:
    inputs:
      hostname:
        type: string
        required: false
        default: ''
      tests:
        type: string
        required: false
        default: ''
      jobs:
        type: string
        required: false
        default: 'all'
      platform:
        type: string
        required: false
        default: 'all'

permissions:
  contents: read

jobs:
  discover:
    name: Discover (${{ matrix.runner.name }})
    if: inputs.jobs == 'all' || inputs.jobs == 'discover' || inputs.jobs == 'integration'
    runs-on:
      group: wendy-developer
      labels: [self-hosted, '${{ matrix.runner.os }}', '${{ matrix.runner.arch }}']
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.explicit.outputs.matrix || steps.scan.outputs.matrix || '[]' }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - { name: macOS, os: macOS, arch: ARM64 }
    steps:
      - name: Resolve explicit device
        id: explicit
        if: inputs.hostname != ''
        env:
          INPUT_HOSTNAME: ${{ inputs.hostname }}
        run: |
          set -euo pipefail
          hostname="$INPUT_HOSTNAME"
          validate_device_hostname() {
            local value="$1"
            if [[ -z "$value" || ${#value} -gt 253 ]]; then
              return 1
            fi
            if [[ "$value" == *:* ]]; then
              [[ "$value" =~ ^[0-9A-Fa-f:.]+$ ]]
            else
              [[ "$value" =~ ^[A-Za-z0-9]([A-Za-z0-9-]{0,61}[A-Za-z0-9])?(\.[A-Za-z0-9]([A-Za-z0-9-]{0,61}[A-Za-z0-9])?)*\.?$ ]]
            fi
          }
          if ! validate_device_hostname "$hostname"; then
            echo "ERROR: invalid device hostname: $hostname" >&2
            exit 1
          fi
          # Match test-ci.sh normalization for bare mDNS hostnames.
          if [[ "$hostname" != *.local && "$hostname" != *.* && "$hostname" != *:* ]]; then
            hostname="${hostname}.local"
          fi
          matrix=$(jq -cn --arg h "$hostname" '[$h]')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "Using explicit device: $hostname"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: inputs.hostname == '' || inputs.jobs == 'all' || inputs.jobs == 'discover'

      - name: Set up Go
        if: inputs.hostname == '' || inputs.jobs == 'all' || inputs.jobs == 'discover'
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Build CLI
        if: inputs.hostname == '' || inputs.jobs == 'all' || inputs.jobs == 'discover'
        working-directory: go
        run: make build-cli

      - name: Run wendy discover
        id: scan
        if: inputs.hostname == '' || inputs.jobs == 'all' || inputs.jobs == 'discover'
        env:
          INPUT_HOSTNAME: ${{ inputs.hostname }}
          INPUT_JOBS: ${{ inputs.jobs }}
        run: |
          set -euo pipefail
          DISCOVER_STDERR=$(mktemp)
          RESULT=$(./go/bin/wendy discover --json --timeout 10s 2>"$DISCOVER_STDERR" || true)
          cat "$DISCOVER_STDERR" >&2 || true
          rm -f "$DISCOVER_STDERR"
          if [[ -z "$RESULT" ]]; then
            RESULT='{"lanDevices":[]}'
          fi
          echo "$RESULT" | jq .

          # Allowlist of known CI target devices. Only devices in this list are
          # included in the test matrix — unexpected devices on the LAN are ignored.
          EXPECTED=(
            "wendy-SER9.local"
            "wendyos-jetson-thor-ci.local"
            "wendyos-dynamic-channel.local"
          )

          for host in "${EXPECTED[@]}"; do
            if echo "$RESULT" | jq -e --arg h "$host" \
              '(.lanDevices // [])[] | select(.hostname == $h)' > /dev/null 2>&1; then
              echo "FOUND: $host"
            else
              echo "MISSING: $host"
            fi
          done

          validate_device_hostname() {
            local value="$1"
            if [[ -z "$value" || ${#value} -gt 253 ]]; then
              return 1
            fi
            if [[ "$value" == *:* ]]; then
              [[ "$value" =~ ^[0-9A-Fa-f:.]+$ ]]
            else
              [[ "$value" =~ ^[A-Za-z0-9]([A-Za-z0-9-]{0,61}[A-Za-z0-9])?(\.[A-Za-z0-9]([A-Za-z0-9-]{0,61}[A-Za-z0-9])?)*\.?$ ]]
            fi
          }

          DISCOVERED_COUNT=0
          HOSTS=()
          while IFS= read -r host; do
            [[ -z "$host" ]] && continue
            DISCOVERED_COUNT=$((DISCOVERED_COUNT + 1))
            if ! validate_device_hostname "$host"; then
              echo "ERROR: invalid discovered device hostname: $host" >&2
              exit 1
            fi
            # Only include devices that are in the allowlist.
            IN_EXPECTED=false
            for expected in "${EXPECTED[@]}"; do
              [[ "$host" == "$expected" ]] && IN_EXPECTED=true && break
            done
            if [[ "$IN_EXPECTED" == true ]]; then
              HOSTS+=("$host")
            else
              echo "SKIPPED (not in allowlist): $host"
            fi
          done < <(echo "$RESULT" | jq -r '(.lanDevices // [])[].hostname // empty')

          COUNT=${#HOSTS[@]}
          if [[ "$COUNT" -gt 10 ]]; then
            echo "ERROR: refusing to create integration matrix for $COUNT discovered devices (max 10)" >&2
            exit 1
          fi

          if [[ "$COUNT" -eq 0 ]]; then
            MATRIX='[]'
          else
            MATRIX=$(jq -cn --args '$ARGS.positional' "${HOSTS[@]}")
          fi
          [[ -n "$MATRIX" && "$MATRIX" != "null" ]] || { echo "ERROR: failed to build device matrix" >&2; exit 1; }
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

          echo "Discovered $DISCOVERED_COUNT LAN device(s); selected $COUNT allowlisted device(s)."
          if [[ -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
            {
              echo "### Wendy integration discovery"
              echo
              echo "- LAN devices discovered: $DISCOVERED_COUNT"
              echo "- Allowlisted devices selected: $COUNT"
              if [[ "$DISCOVERED_COUNT" -gt 0 && "$COUNT" -eq 0 ]]; then
                echo
                echo "No discovered LAN devices matched the integration allowlist, so downstream integration jobs will be skipped."
              fi
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "$INPUT_HOSTNAME" == '' && "$INPUT_JOBS" != 'discover' && "$DISCOVERED_COUNT" -eq 0 ]]; then
            echo "ERROR: No LAN devices found via wendy discover" >&2
            exit 1
          fi

  integration-test-macos:
    name: Integration (macOS → ${{ matrix.hostname }})
    needs: discover
    if: >-
      needs.discover.outputs.matrix != '[]' &&
      (inputs.jobs == 'all' || inputs.jobs == 'integration') &&
      (inputs.platform == 'all' || inputs.platform == 'macos')
    runs-on:
      group: wendy-developer
      labels: [self-hosted, macOS, ARM64]
    concurrency:
      group: device-${{ matrix.hostname }}
      cancel-in-progress: false
      queue: max
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        hostname: ${{ fromJson(needs.discover.outputs.matrix) }}
    env:
      INPUT_HOSTNAME: ${{ matrix.hostname }}
      INPUT_TESTS: ${{ inputs.tests }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Build CLI
        working-directory: go
        run: make build-cli

      - name: Prepare Docker
        id: prepare-docker
        run: |
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          DOCKER_READY=false
          if docker info >/dev/null 2>&1; then
            echo "Docker already available"
            DOCKER_READY=true
          elif [ -d "/Applications/Docker.app" ]; then
            echo "Starting Docker Desktop..."
            open -a Docker
            for attempt in $(seq 1 30); do
              echo "Waiting for Docker Desktop ($attempt/30)..."
              if docker info >/dev/null 2>&1; then DOCKER_READY=true; break; fi
              sleep 5
            done
          elif command -v colima >/dev/null 2>&1; then
            echo "Starting Colima..."
            colima start
            until docker info >/dev/null 2>&1; do sleep 2; done
            DOCKER_READY=true
          else
            echo "WARNING: Neither Docker Desktop nor Colima found; integration tests will be skipped"
          fi
          echo "docker_ready=$DOCKER_READY" >> "$GITHUB_OUTPUT"

      - name: Run integration tests
        if: steps.prepare-docker.outputs.docker_ready == 'true'
        run: |
          # All wendy CLI calls below run via SSH to localhost rather than
          # directly. The self-hosted runner runs as a macOS LaunchAgent which
          # does not hold the Local Network TCC permission that macOS requires
          # for mDNS (.local) resolution and link-local connections. An SSH
          # session to localhost runs under the logged-in user, which has that
          # permission. See nightly-os-update.yml for the same pattern.
          WORKDIR="$(pwd)"
          SSH=(ssh -o StrictHostKeyChecking=no localhost)

          TEST_ARGS=(-w "$WORKDIR/go/bin/wendy")

          if [[ -n "$INPUT_TESTS" ]]; then
            HAS_TESTS=false
            IFS=',' read -ra TEST_ARRAY <<< "$INPUT_TESTS"
            for t in "${TEST_ARRAY[@]}"; do
              t="$(echo "$t" | xargs)"
              if [[ ! "$t" =~ ^[A-Za-z0-9_.-]+$ ]]; then
                echo "ERROR: invalid test name: $t" >&2
                exit 1
              fi
              TEST_ARGS+=(-t "$t")
              HAS_TESTS=true
            done
            if [[ "$HAS_TESTS" == false ]]; then
              echo "No applicable tests requested, skipping."
              exit 0
            fi
          else
            for t in swift-hello swift-network swift-bluetooth swift-resources python-hello python-network python-gpu python-onnx-gpu python-bluetooth python-no-network python-no-bluetooth python-no-ptrace python-no-unshare python-multiservice python-servicename otel-localhost-only; do
              TEST_ARGS+=(-t "$t")
            done
          fi

          builder_slug="$(printf '%s' "$INPUT_HOSTNAME" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9_.-]+/-/g; s/^-+//; s/-+$//')"
          BUILDER="wendy-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_JOB}-${builder_slug}"
          BUILDER="${BUILDER:0:128}"
          docker buildx rm "$BUILDER" --force 2>/dev/null || true
          trap 'docker buildx rm "$BUILDER" --force 2>/dev/null || true' EXIT

          echo "==> Starting tests on $INPUT_HOSTNAME (builder: $BUILDER)"
          if "${SSH[@]}" bash -s -- "$WORKDIR" "$BUILDER" "${DOCKER_HOST:-}" "$INPUT_HOSTNAME" "${TEST_ARGS[@]}" <<'REMOTE'
          set -euo pipefail
          WORKDIR="$1"; shift
          BUILDER="$1"; shift
          DOCKER_HOST_VALUE="$1"; shift
          HOSTNAME="$1"; shift
          export PATH="/opt/homebrew/bin:/usr/local/bin:$HOME/.local/bin:$HOME/bin:$PATH"
          export DOCKER_HOST="$DOCKER_HOST_VALUE"
          export WENDY_BUILDX_BUILDER="$BUILDER"
          cd "$WORKDIR"
          exec go/scripts/test-ci.sh "$@" -h "$HOSTNAME"
          REMOTE
          then
            exit 0
          else
            exit $?
          fi

  integration-test-linux:
    name: Integration (Linux → ${{ matrix.hostname }})
    needs: discover
    if: >-
      needs.discover.outputs.matrix != '[]' &&
      (inputs.jobs == 'all' || inputs.jobs == 'integration') &&
      (inputs.platform == 'all' || inputs.platform == 'linux')
    runs-on:
      group: wendy-developer
      labels: [self-hosted, Linux]
    concurrency:
      group: device-${{ matrix.hostname }}
      cancel-in-progress: false
      queue: max
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        hostname: ${{ fromJson(needs.discover.outputs.matrix) }}
    env:
      INPUT_HOSTNAME: ${{ matrix.hostname }}
      INPUT_TESTS: ${{ inputs.tests }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Build CLI
        working-directory: go
        run: make build-cli

      - name: Prepare Docker
        id: prepare-docker
        run: |
          DOCKER_READY=false
          if docker info >/dev/null 2>&1; then
            echo "Docker already available"
            DOCKER_READY=true
          else
            echo "WARNING: Docker not available; integration tests will be skipped"
          fi
          echo "docker_ready=$DOCKER_READY" >> "$GITHUB_OUTPUT"

      - name: Run integration tests
        if: steps.prepare-docker.outputs.docker_ready == 'true'
        env:
          # The harness launches the CLI as subprocesses; keep the token scoped to
          # this integration step so release checks inherit it without SSH forwarding.
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          WORKDIR="$(pwd)"

          TEST_ARGS=(-w "$WORKDIR/go/bin/wendy")

          if [[ -n "$INPUT_TESTS" ]]; then
            HAS_TESTS=false
            IFS=',' read -ra TEST_ARRAY <<< "$INPUT_TESTS"
            for t in "${TEST_ARRAY[@]}"; do
              t="$(echo "$t" | xargs)"
              if [[ ! "$t" =~ ^[A-Za-z0-9_.-]+$ ]]; then
                echo "ERROR: invalid test name: $t" >&2
                exit 1
              fi
              # Skip swift-* tests on Linux.
              if [[ "$t" == swift-* ]]; then
                echo "Skipping Swift test $t on Linux"
                continue
              fi
              TEST_ARGS+=(-t "$t")
              HAS_TESTS=true
            done
            if [[ "$HAS_TESTS" == false ]]; then
              echo "No applicable tests requested, skipping."
              exit 0
            fi
          else
            for t in python-hello python-network python-gpu python-onnx-gpu python-bluetooth python-no-network python-no-bluetooth python-no-ptrace python-no-unshare python-multiservice python-servicename otel-localhost-only; do
              TEST_ARGS+=(-t "$t")
            done
          fi

          builder_slug="$(printf '%s' "$INPUT_HOSTNAME" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9_.-]+/-/g; s/^-+//; s/-+$//')"
          BUILDER="wendy-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_JOB}-${builder_slug}"
          BUILDER="${BUILDER:0:128}"
          docker buildx rm "$BUILDER" --force 2>/dev/null || true
          trap 'docker buildx rm "$BUILDER" --force 2>/dev/null || true' EXIT

          echo "==> Starting tests on $INPUT_HOSTNAME (builder: $BUILDER)"
          WENDY_BUILDX_BUILDER="$BUILDER" go/scripts/test-ci.sh "${TEST_ARGS[@]}" -h "$INPUT_HOSTNAME"
