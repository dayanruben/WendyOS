name: Swift E2E Tests

on:
  push:
    branches:
      - kb.swift-e2e-tests
  pull_request:
    paths:
      - 'swift/**'
      - 'Proto/**'
      - '.github/actions/swift-e2e-run/**'
      - '.github/workflows/swift-e2e-tests.yml'
  workflow_dispatch:
    inputs:
      tests:
        description: 'Comma-separated SwiftPM test filters (empty = WendyE2ETests)'
        required: false
        default: ''
  workflow_call:
    inputs:
      tests:
        type: string
        required: false
        default: ''
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false

concurrency:
  group: swift-e2e-tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  issues: write
  pull-requests: read

jobs:
  # Run jobs are explicit per-device chains rather than one matrix. The first
  # batch spreads work across the one macOS, one Linux, and one Windows runner,
  # while each device chain still serializes access to its physical target.
  e2e-macos-jetson-orin-nano:
    name: macOS 26 → Jetson Orin Nano
    runs-on: ["self-hosted", "macOS"]
    concurrency:
      group: swift-e2e-jetson-orin-nano
      cancel-in-progress: false
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/swift-e2e-run
        with:
          tests: ${{ inputs.tests || '' }}
          target_id: macos-jetson-orin-nano
          runner_id: macos-26
          cli_os: macOS
          device_address: wendyos-jetson-orin-nano.local
          agent_os: wendyOS
          transport: lan

  e2e-ubuntu-jetson-orin-nano:
    name: Ubuntu 24 → Jetson Orin Nano
    needs: e2e-macos-jetson-orin-nano
    if: ${{ always() && !cancelled() }}
    runs-on: ["self-hosted", "Linux"]
    concurrency:
      group: swift-e2e-jetson-orin-nano
      cancel-in-progress: false
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/swift-e2e-run
        with:
          tests: ${{ inputs.tests || '' }}
          target_id: ubuntu-jetson-orin-nano
          runner_id: ubuntu-24-04
          cli_os: linux
          device_address: wendyos-jetson-orin-nano.local
          agent_os: wendyOS
          transport: lan

  e2e-windows-jetson-orin-nano:
    name: Windows 11 → Jetson Orin Nano
    needs: e2e-ubuntu-jetson-orin-nano
    if: ${{ always() && !cancelled() }}
    runs-on: ["self-hosted", "Windows"]
    concurrency:
      group: swift-e2e-jetson-orin-nano
      cancel-in-progress: false
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/swift-e2e-run
        with:
          tests: ${{ inputs.tests || '' }}
          target_id: windows-jetson-orin-nano
          runner_id: windows-11
          cli_os: windows
          device_address: wendyos-jetson-orin-nano.local
          agent_os: wendyOS
          transport: lan

  e2e-ubuntu-raspberry-pi-5:
    name: Ubuntu 24 → Raspberry Pi 5
    runs-on: ["self-hosted", "Linux"]
    concurrency:
      group: swift-e2e-raspberry-pi-5
      cancel-in-progress: false
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/swift-e2e-run
        with:
          tests: ${{ inputs.tests || '' }}
          target_id: ubuntu-raspberry-pi-5
          runner_id: ubuntu-24-04
          cli_os: linux
          device_address: wendyos-raspberry-pi-5.local
          agent_os: wendyOS
          transport: lan

  e2e-windows-raspberry-pi-5:
    name: Windows 11 → Raspberry Pi 5
    needs: e2e-ubuntu-raspberry-pi-5
    if: ${{ always() && !cancelled() }}
    runs-on: ["self-hosted", "Windows"]
    concurrency:
      group: swift-e2e-raspberry-pi-5
      cancel-in-progress: false
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/swift-e2e-run
        with:
          tests: ${{ inputs.tests || '' }}
          target_id: windows-raspberry-pi-5
          runner_id: windows-11
          cli_os: windows
          device_address: wendyos-raspberry-pi-5.local
          agent_os: wendyOS
          transport: lan

  e2e-macos-raspberry-pi-5:
    name: macOS 26 → Raspberry Pi 5
    needs: e2e-windows-raspberry-pi-5
    if: ${{ always() && !cancelled() }}
    runs-on: ["self-hosted", "macOS"]
    concurrency:
      group: swift-e2e-raspberry-pi-5
      cancel-in-progress: false
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/swift-e2e-run
        with:
          tests: ${{ inputs.tests || '' }}
          target_id: macos-raspberry-pi-5
          runner_id: macos-26
          cli_os: macOS
          device_address: wendyos-raspberry-pi-5.local
          agent_os: wendyOS
          transport: lan

  e2e-windows-mac-mini:
    name: Windows 11 → Mac mini
    runs-on: ["self-hosted", "Windows"]
    concurrency:
      group: swift-e2e-mac-mini
      cancel-in-progress: false
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/swift-e2e-run
        with:
          tests: ${{ inputs.tests || '' }}
          target_id: windows-mac-mini
          runner_id: windows-11
          cli_os: windows
          device_address: mac-mini.local
          agent_os: macOS
          transport: lan

  e2e-macos-mac-mini:
    name: macOS 26 → Mac mini
    needs: e2e-windows-mac-mini
    if: ${{ always() && !cancelled() }}
    runs-on: ["self-hosted", "macOS"]
    concurrency:
      group: swift-e2e-mac-mini
      cancel-in-progress: false
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/swift-e2e-run
        with:
          tests: ${{ inputs.tests || '' }}
          target_id: macos-mac-mini
          runner_id: macos-26
          cli_os: macOS
          device_address: mac-mini.local
          agent_os: macOS
          transport: lan

  e2e-ubuntu-mac-mini:
    name: Ubuntu 24 → Mac mini
    needs: e2e-macos-mac-mini
    if: ${{ always() && !cancelled() }}
    runs-on: ["self-hosted", "Linux"]
    concurrency:
      group: swift-e2e-mac-mini
      cancel-in-progress: false
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/swift-e2e-run
        with:
          tests: ${{ inputs.tests || '' }}
          target_id: ubuntu-mac-mini
          runner_id: ubuntu-24-04
          cli_os: linux
          device_address: mac-mini.local
          agent_os: macOS
          transport: lan
  swift-e2e-analyze:
    name: Analyze E2E Results
    if: ${{ always() && !cancelled() }}
    needs:
      - e2e-macos-jetson-orin-nano
      - e2e-ubuntu-jetson-orin-nano
      - e2e-windows-jetson-orin-nano
      - e2e-ubuntu-raspberry-pi-5
      - e2e-windows-raspberry-pi-5
      - e2e-macos-raspberry-pi-5
      - e2e-windows-mac-mini
      - e2e-macos-mac-mini
      - e2e-ubuntu-mac-mini
    runs-on: [self-hosted, Linux]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute Swift E2E run ID
        id: e2e-run
        shell: bash
        run: |
          set -euo pipefail
          slug() {
            printf '%s' "$1" \
              | tr '[:upper:]' '[:lower:]' \
              | sed -E 's/[^[:alnum:]._-]+/-/g; s/-+/-/g; s/^-//; s/-$//'
          }

          workflow_id="$(slug "${GITHUB_WORKFLOW:-swift-e2e-tests}")"
          printf -v attempt_suffix '%04d' "${GITHUB_RUN_ATTEMPT:-1}"
          echo "run_artifact_id=${workflow_id}.gh${GITHUB_RUN_ID}.run.${attempt_suffix}" >> "$GITHUB_OUTPUT"
          echo "run_dir=/tmp/wendy/${workflow_id}.gh${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Prepare Swift E2E analysis workspace
        shell: bash
        run: |
          set -euo pipefail
          rm -rf \
            "/tmp/wendy-raw/${{ github.run_id }}" \
            "${{ steps.e2e-run.outputs.run_dir }}"

      - name: Download Swift E2E attempts
        uses: actions/download-artifact@v5
        with:
          path: /tmp/wendy-raw/${{ github.run_id }}
          pattern: swift-e2e-tests.gh${{ github.run_id }}.*

      - name: Aggregate Swift E2E attempts
        working-directory: swift
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t attempt_dirs < <(find /tmp/wendy-raw/${{ github.run_id }} -mindepth 1 -maxdepth 1 -type d | sort)
          if [[ ${#attempt_dirs[@]} -eq 0 ]]; then
            echo "ERROR: no Swift E2E attempt artifacts downloaded." >&2
            exit 1
          fi
          bash ./Scripts/E2EAggregate.sh \
            --output-dir /tmp/wendy \
            "${attempt_dirs[@]}"

      - name: Review Swift E2E run
        working-directory: swift
        shell: bash
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          bash ./Scripts/E2EReview.sh \
            --run-dir "${{ steps.e2e-run.outputs.run_dir }}" \
            --diff "origin/main...HEAD"

      - name: Render Swift E2E run index
        if: always()
        working-directory: swift
        shell: bash
        run: |
          set -euo pipefail
          bash ./Scripts/E2EReport.sh \
            --run-dir "${{ steps.e2e-run.outputs.run_dir }}"

      - name: Post Swift E2E review PR comment
        if: always()
        uses: actions/github-script@v9
        env:
          REPO: ${{ github.event.pull_request.base.repo.full_name || github.repository }}
          PR_NUM: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.head_ref || github.ref_name }}
          HEAD_LABEL: ${{ github.event.pull_request.head.label || github.head_ref || github.ref_name }}
          COMMENT_PATH: ${{ steps.e2e-run.outputs.run_dir }}/review.md
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');

            const commentPath = process.env.COMMENT_PATH;
            if (!fs.existsSync(commentPath)) {
              core.info(`No Swift E2E review aggregate found at ${commentPath}; skipping.`);
              return;
            }

            const [owner, repo] = process.env.REPO.split('/');
            const headRef = process.env.HEAD_REF;
            const headLabel = process.env.HEAD_LABEL;
            let prNumber = process.env.PR_NUM;

            if (!prNumber) {
              const qualifiedHead = headLabel?.includes(':') ? headLabel : `${context.repo.owner}:${headRef}`;
              const heads = [qualifiedHead, headLabel, headRef].filter((value, index, values) =>
                value && values.indexOf(value) === index
              );
              for (const head of heads) {
                const { data: pulls } = await github.rest.pulls.list({
                  owner,
                  repo,
                  state: 'open',
                  head,
                  per_page: 1,
                });
                if (pulls.length > 0) {
                  prNumber = String(pulls[0].number);
                  break;
                }
              }
            }

            if (!prNumber) {
              core.info(`No open PR found for ${headRef}; skipping Swift E2E review comment.`);
              return;
            }

            const body = fs.readFileSync(commentPath, 'utf8');
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: Number(prNumber),
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.body?.startsWith('# Swift E2E Review')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: Number(prNumber),
                body,
              });
            }

      - name: Upload Swift E2E run report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.e2e-run.outputs.run_artifact_id }}
          path: ${{ steps.e2e-run.outputs.run_dir }}/**
          if-no-files-found: warn
          retention-days: 14
