name: Swift E2E Tests

on:
  push:
    branches:
      - kb.swift-e2e-tests
  workflow_dispatch:
    inputs:
      tests:
        description: 'Comma-separated SwiftPM test filters (empty = WendyE2ETests)'
        required: false
        default: ''
  workflow_call:
    inputs:
      tests:
        type: string
        required: false
        default: ''
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false

concurrency:
  group: swift-e2e-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Route jobs are explicit per-device chains rather than one matrix. This keeps
  # every route visible in the Actions UI while serializing access to each
  # physical device.
  e2e-macos-jetson-orin-nano:
    name: macOS 26 → Jetson Orin Nano
    uses: ./.github/workflows/swift-e2e-route.yml
    with:
      tests: ${{ inputs.tests || '' }}
      target_id: macos-26-to-jetson-orin-nano
      runner_id: macos-26
      runs_on: '["self-hosted", "macOS"]'
      cli_os: macOS
      device_id: jetson-orin-nano
      device_address: wendyos-jetson-orin-nano.local
      agent_os: wendyOS
      transport: lan

  e2e-ubuntu-jetson-orin-nano:
    name: Ubuntu 24.04 → Jetson Orin Nano
    needs: e2e-macos-jetson-orin-nano
    if: ${{ always() && !cancelled() }}
    uses: ./.github/workflows/swift-e2e-route.yml
    with:
      tests: ${{ inputs.tests || '' }}
      target_id: ubuntu-24-04-to-jetson-orin-nano
      runner_id: ubuntu-24-04
      runs_on: '["self-hosted", "linux"]'
      cli_os: linux
      device_id: jetson-orin-nano
      device_address: wendyos-jetson-orin-nano.local
      agent_os: wendyOS
      transport: lan

  e2e-windows-jetson-orin-nano:
    name: Windows 11 → Jetson Orin Nano
    needs: e2e-ubuntu-jetson-orin-nano
    if: ${{ always() && !cancelled() }}
    uses: ./.github/workflows/swift-e2e-route.yml
    with:
      tests: ${{ inputs.tests || '' }}
      target_id: windows-11-to-jetson-orin-nano
      runner_id: windows-11
      runs_on: '["self-hosted", "Windows", "X64", "windows-11"]'
      cli_os: windows
      device_id: jetson-orin-nano
      device_address: wendyos-jetson-orin-nano.local
      agent_os: wendyOS
      transport: lan

  e2e-macos-raspberry-pi-5:
    name: macOS 26 → Raspberry Pi 5
    uses: ./.github/workflows/swift-e2e-route.yml
    with:
      tests: ${{ inputs.tests || '' }}
      target_id: macos-26-to-raspberry-pi-5
      runner_id: macos-26
      runs_on: '["self-hosted", "macOS"]'
      cli_os: macOS
      device_id: raspberry-pi-5
      device_address: wendyos-raspberry-pi-5.local
      agent_os: wendyOS
      transport: lan

  e2e-ubuntu-raspberry-pi-5:
    name: Ubuntu 24.04 → Raspberry Pi 5
    needs: e2e-macos-raspberry-pi-5
    if: ${{ always() && !cancelled() }}
    uses: ./.github/workflows/swift-e2e-route.yml
    with:
      tests: ${{ inputs.tests || '' }}
      target_id: ubuntu-24-04-to-raspberry-pi-5
      runner_id: ubuntu-24-04
      runs_on: '["self-hosted", "linux"]'
      cli_os: linux
      device_id: raspberry-pi-5
      device_address: wendyos-raspberry-pi-5.local
      agent_os: wendyOS
      transport: lan

  e2e-windows-raspberry-pi-5:
    name: Windows 11 → Raspberry Pi 5
    needs: e2e-ubuntu-raspberry-pi-5
    if: ${{ always() && !cancelled() }}
    uses: ./.github/workflows/swift-e2e-route.yml
    with:
      tests: ${{ inputs.tests || '' }}
      target_id: windows-11-to-raspberry-pi-5
      runner_id: windows-11
      runs_on: '["self-hosted", "Windows", "X64", "windows-11"]'
      cli_os: windows
      device_id: raspberry-pi-5
      device_address: wendyos-raspberry-pi-5.local
      agent_os: wendyOS
      transport: lan

  e2e-macos-mac-mini:
    name: macOS 26 → Mac mini
    uses: ./.github/workflows/swift-e2e-route.yml
    with:
      tests: ${{ inputs.tests || '' }}
      target_id: macos-26-to-mac-mini
      runner_id: macos-26
      runs_on: '["self-hosted", "macOS"]'
      cli_os: macOS
      device_id: mac-mini
      device_address: mac-mini.local
      agent_os: macOS
      transport: lan

  e2e-ubuntu-mac-mini:
    name: Ubuntu 24.04 → Mac mini
    needs: e2e-macos-mac-mini
    if: ${{ always() && !cancelled() }}
    uses: ./.github/workflows/swift-e2e-route.yml
    with:
      tests: ${{ inputs.tests || '' }}
      target_id: ubuntu-24-04-to-mac-mini
      runner_id: ubuntu-24-04
      runs_on: '["self-hosted", "linux"]'
      cli_os: linux
      device_id: mac-mini
      device_address: mac-mini.local
      agent_os: macOS
      transport: lan

  swift-e2e-aggregate:
    name: Aggregate Swift E2E Results
    if: ${{ always() && !cancelled() }}
    needs:
      - e2e-macos-jetson-orin-nano
      - e2e-ubuntu-jetson-orin-nano
      - e2e-windows-jetson-orin-nano
      - e2e-macos-raspberry-pi-5
      - e2e-ubuntu-raspberry-pi-5
      - e2e-windows-raspberry-pi-5
      - e2e-macos-mac-mini
      - e2e-ubuntu-mac-mini
    runs-on: [self-hosted, linux]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Compute Swift E2E aggregate ID
        id: e2e-aggregate
        shell: bash
        run: |
          set -euo pipefail
          slug() {
            printf '%s' "$1" \
              | tr '[:upper:]' '[:lower:]' \
              | sed -E 's/[^[:alnum:]._-]+/-/g; s/-+/-/g; s/^-//; s/-$//'
          }

          workflow_id="$(slug "${GITHUB_WORKFLOW:-swift-e2e-tests}")"
          printf -v attempt_suffix '%04d' "${GITHUB_RUN_ATTEMPT:-1}"
          echo "aggregate_id=${workflow_id}.gh${GITHUB_RUN_ID}.aggregate.${attempt_suffix}" >> "$GITHUB_OUTPUT"
          echo "aggregate_dir=/tmp/wendy/${workflow_id}.gh${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Download Swift E2E runs
        uses: actions/download-artifact@v5
        with:
          path: /tmp/wendy-raw
          pattern: swift-e2e-tests.gh${{ github.run_id }}.*

      - name: Aggregate Swift E2E runs
        working-directory: swift
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t run_dirs < <(find /tmp/wendy-raw -mindepth 1 -maxdepth 1 -type d | sort)
          if [[ ${#run_dirs[@]} -eq 0 ]]; then
            echo "ERROR: no Swift E2E run artifacts downloaded." >&2
            exit 1
          fi
          bash ./Scripts/E2EAggregate.sh \
            --output-dir /tmp/wendy \
            "${run_dirs[@]}"

      - name: Skip Swift E2E aggregate AI review
        if: always()
        shell: bash
        run: echo "Swift E2E aggregate AI review is disabled for now."

      - name: Render Swift E2E aggregate index
        if: always()
        working-directory: swift
        shell: bash
        run: |
          set -euo pipefail
          bash ./Scripts/E2EReport.sh \
            --run-dir "${{ steps.e2e-aggregate.outputs.aggregate_dir }}"

      - name: Upload Swift E2E aggregate
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.e2e-aggregate.outputs.aggregate_id }}
          path: ${{ steps.e2e-aggregate.outputs.aggregate_dir }}/**
          if-no-files-found: warn
          retention-days: 14
