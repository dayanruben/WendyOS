name: Security

on:
  pull_request:
    branches: [main]
    # The docs site lives under go/internal/cli/assets/docs but is a Next.js app,
    # not Go. Exclude it so docs-only PRs don't run the Go vuln/security scans.
    paths:
      - 'go/**'
      - '!go/internal/cli/assets/docs/**'
      - 'Proto/**'
      - 'go.mod'
      - 'go.sum'
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: security-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  govulncheck:
    name: govulncheck
    runs-on: runs-on,runner=2cpu-linux-x64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libusb-1.0-0-dev

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.2.0

      - name: Run govulncheck
        working-directory: go
        run: govulncheck ./...
