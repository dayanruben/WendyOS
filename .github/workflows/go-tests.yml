name: Go Tests

on:
  pull_request:
    paths:
      - 'go/**'
      - 'Proto/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/**'
      - '.github/scripts/**'

concurrency:
  group: go-tests-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: runs-on,runner=2cpu-linux-x64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libusb-1.0-0-dev

      - name: Run tests
        working-directory: go
        # Go 1.26.4 can ICE on the Linux runner while compiling some
        # dependencies with the race detector and parallel compilation.
        # Keep race coverage but compile serially.
        run: go test -p=1 -gcflags=all=-c=1 ./... -race -count=1 -timeout 120s

      # Compile the Windows-shipping CLI packages so //go:build windows files
      # (e.g. wifi_scan_windows.go) are at least type-checked in PR CI. The
      # Linux runner can't execute Windows tests, but cross-compiling them
      # catches build breaks that would otherwise only surface in the
      # release workflow. The agent intentionally is not cross-compiled —
      # it uses Linux-only syscalls and only the CLI ships to Windows.
      - name: Cross-compile Windows CLI packages
        working-directory: go
        env:
          GOOS: windows
          GOARCH: amd64
        run: |
          go build ./internal/cli/... ./cmd/wendy/
          go test -c -o /dev/null ./internal/cli/commands

  vet:
    name: Vet
    runs-on: runs-on,runner=2cpu-linux-x64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libusb-1.0-0-dev

      - name: Run go vet
        working-directory: go
        run: go vet ./...

  format:
    name: Format Check
    runs-on: runs-on,runner=2cpu-linux-x64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Check formatting
        working-directory: go
        run: |
          UNFORMATTED=$(gofmt -l -s .)
          if [ -n "$UNFORMATTED" ]; then
            echo "The following files need formatting:"
            echo "$UNFORMATTED"
            echo ""
            echo "Run 'gofmt -w -s .' to fix."
            exit 1
          fi

  shell-tests:
    name: Install script tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: shellcheck install scripts
        run: shellcheck go/internal/cli/assets/docs/agent.sh go/internal/cli/assets/docs/cli.sh
      - name: resolver + deferral tests
        run: bash .github/scripts/install-scripts_test.sh
      - name: manifest merge tests
        run: bash .github/scripts/install-manifest-merge_test.sh
