name: Template Tests

on:
  workflow_dispatch:
    inputs:
      templates_branch:
        description: 'Templates repo branch (default: main)'
        required: false
        default: 'main'
      template:
        description: 'Filter to a specific template name (empty = all)'
        required: false
        default: ''
      exclude_template:
        description: 'Space-separated template names to skip (e.g. voice-ai-pipecat)'
        required: false
        default: 'voice-ai-pipecat'
      language:
        description: 'Filter to a specific language (empty = all)'
        required: false
        default: ''
      deploy:
        description: 'Deploy generated projects to hardware device'
        type: boolean
        default: true
      hostname:
        description: 'Device hostname for deploy phase (empty = first auto-discovered LAN device)'
        required: false
        default: ''

  workflow_call:
    inputs:
      templates_branch:
        type: string
        default: 'main'
      template:
        type: string
        default: ''
      exclude_template:
        type: string
        default: 'voice-ai-pipecat'
      language:
        type: string
        default: ''
      deploy:
        type: boolean
        default: true
      hostname:
        type: string
        default: ''

permissions:
  contents: read

concurrency:
  group: template-tests-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-validate:
    name: Generate & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build CLI
        working-directory: go
        run: make build-cli

      - name: Run template generation tests
        working-directory: go
        env:
          INPUT_TEMPLATES_BRANCH: ${{ inputs.templates_branch }}
          INPUT_TEMPLATE: ${{ inputs.template }}
          INPUT_EXCLUDE_TEMPLATE: ${{ inputs.exclude_template }}
          INPUT_LANGUAGE: ${{ inputs.language }}
        run: |
          args=(-w ./bin/wendy --skip-run)

          if [[ -n "$INPUT_TEMPLATES_BRANCH" && "$INPUT_TEMPLATES_BRANCH" != "main" ]]; then
            args+=(--templates-branch "$INPUT_TEMPLATES_BRANCH")
          fi

          if [[ -n "$INPUT_TEMPLATE" ]]; then
            args+=(--template "$INPUT_TEMPLATE")
          fi

          for excl in $INPUT_EXCLUDE_TEMPLATE; do
            args+=(--exclude-template "$excl")
          done

          if [[ -n "$INPUT_LANGUAGE" ]]; then
            args+=(--language "$INPUT_LANGUAGE")
          fi

          scripts/test-templates.sh "${args[@]}"

      - name: Cleanup
        if: always()
        working-directory: go
        run: make clean

  resolve-deploy-devices:
    name: Resolve deploy devices
    if: inputs.deploy == true
    runs-on:
      group: wendy-developer
      labels: [self-hosted, macOS, ARM64]
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.explicit.outputs.matrix || steps.scan.outputs.matrix || '[]' }}
    steps:
      - name: Resolve explicit device
        id: explicit
        if: inputs.hostname != ''
        env:
          INPUT_HOSTNAME: ${{ inputs.hostname }}
        run: |
          set -euo pipefail
          hostname="$INPUT_HOSTNAME"
          validate_device_hostname() {
            local value="$1"
            if [[ -z "$value" || ${#value} -gt 253 ]]; then
              return 1
            fi
            if [[ "$value" == *:* ]]; then
              [[ "$value" =~ ^[0-9A-Fa-f:.]+$ ]]
            else
              [[ "$value" =~ ^[A-Za-z0-9]([A-Za-z0-9-]{0,61}[A-Za-z0-9])?(\.[A-Za-z0-9]([A-Za-z0-9-]{0,61}[A-Za-z0-9])?)*\.?$ ]]
            fi
          }
          if ! validate_device_hostname "$hostname"; then
            echo "ERROR: invalid device hostname: $hostname" >&2
            exit 1
          fi
          # Match the deploy scripts for bare mDNS hostnames while leaving IPs
          # and fully-qualified hostnames unchanged.
          if [[ "$hostname" != *.local && "$hostname" != *.* && "$hostname" != *:* ]]; then
            hostname="${hostname}.local"
          fi
          matrix=$(jq -cn --arg h "$hostname" '[$h]')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "Using explicit deploy device: $hostname"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        if: inputs.hostname == ''

      - name: Set up Go
        if: inputs.hostname == ''
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build CLI
        if: inputs.hostname == ''
        working-directory: go
        run: make build-cli

      - name: Discover deploy device
        id: scan
        if: inputs.hostname == ''
        run: |
          set -euo pipefail
          SSH=(ssh -o StrictHostKeyChecking=no localhost)
          WORKDIR="$(pwd)"

          DISCOVER_STDERR=$(mktemp)
          RESULT=$("${SSH[@]}" bash -s -- "$WORKDIR" <<'REMOTE' 2>"$DISCOVER_STDERR" || true
          set -euo pipefail
          WORKDIR="$1"
          export PATH="/opt/homebrew/bin:/usr/local/bin:$HOME/.local/bin:$HOME/bin:$PATH"
          cd "$WORKDIR"
          ./go/bin/wendy discover --json --type lan --timeout 10s
          REMOTE
          )
          cat "$DISCOVER_STDERR" >&2 || true
          rm -f "$DISCOVER_STDERR"
          if [[ -z "$RESULT" ]]; then
            RESULT='{"lanDevices":[]}'
          fi
          echo "$RESULT" | jq .

          validate_device_hostname() {
            local value="$1"
            if [[ -z "$value" || ${#value} -gt 253 ]]; then
              return 1
            fi
            if [[ "$value" == *:* ]]; then
              [[ "$value" =~ ^[0-9A-Fa-f:.]+$ ]]
            else
              [[ "$value" =~ ^[A-Za-z0-9]([A-Za-z0-9-]{0,61}[A-Za-z0-9])?(\.[A-Za-z0-9]([A-Za-z0-9-]{0,61}[A-Za-z0-9])?)*\.?$ ]]
            fi
          }

          HOSTNAME=$(echo "$RESULT" | jq -r '(.lanDevices // [])[0].hostname // empty')
          if [[ -z "$HOSTNAME" ]]; then
            echo "ERROR: No LAN devices found via wendy discover"
            exit 1
          fi
          if ! validate_device_hostname "$HOSTNAME"; then
            echo "ERROR: invalid discovered device hostname: $HOSTNAME" >&2
            exit 1
          fi

          MATRIX=$(jq -cn --arg h "$HOSTNAME" '[$h]')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Discovered deploy device: $HOSTNAME"

  deploy-to-device:
    name: Deploy (${{ matrix.runner.name }} → ${{ matrix.hostname }})
    if: inputs.deploy == true && needs.resolve-deploy-devices.outputs.matrix != '[]'
    needs: [generate-validate, resolve-deploy-devices]
    runs-on:
      group: wendy-developer
      labels: ${{ matrix.runner.labels }}
    concurrency:
      group: device-${{ matrix.hostname }}
      cancel-in-progress: false
      queue: max
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        runner:
          - { name: macOS, labels: [self-hosted, macOS, ARM64] }
          - { name: Linux, labels: [self-hosted, Linux, X64] }
        hostname: ${{ fromJson(needs.resolve-deploy-devices.outputs.matrix) }}
    env:
      INPUT_HOSTNAME: ${{ matrix.hostname }}
      INPUT_TEMPLATES_BRANCH: ${{ inputs.templates_branch }}
      INPUT_TEMPLATE: ${{ inputs.template }}
      INPUT_EXCLUDE_TEMPLATE: ${{ inputs.exclude_template }}
      INPUT_LANGUAGE: ${{ inputs.language }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build CLI
        working-directory: go
        run: make build-cli

      - name: Run template tests with deploy
        working-directory: go
        run: |
          ARGS=(-w ./bin/wendy -h "$INPUT_HOSTNAME")

          if [[ -n "$INPUT_TEMPLATES_BRANCH" && "$INPUT_TEMPLATES_BRANCH" != "main" ]]; then
            ARGS+=(--templates-branch "$INPUT_TEMPLATES_BRANCH")
          fi

          if [[ -n "$INPUT_TEMPLATE" ]]; then
            ARGS+=(--template "$INPUT_TEMPLATE")
          fi

          for excl in $INPUT_EXCLUDE_TEMPLATE; do
            ARGS+=(--exclude-template "$excl")
          done

          if [[ -n "$INPUT_LANGUAGE" ]]; then
            ARGS+=(--language "$INPUT_LANGUAGE")
          fi

          builder_slug="$(printf '%s' "$INPUT_HOSTNAME" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9_.-]+/-/g; s/^-+//; s/-+$//')"
          BUILDER="wendy-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_JOB}-${builder_slug}"
          BUILDER="${BUILDER:0:128}"
          docker buildx rm "$BUILDER" --force 2>/dev/null || true
          cleanup() { docker buildx rm "$BUILDER" --force 2>/dev/null || true; }
          trap cleanup EXIT

          WENDY_BUILDX_BUILDER="$BUILDER" scripts/test-templates.sh "${ARGS[@]}"

      - name: Cleanup
        if: always()
        working-directory: go
        run: make clean

  summary:
    name: Template Test Summary
    runs-on: ubuntu-latest
    needs: [generate-validate, deploy-to-device]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## Template Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [[ "${{ needs.generate-validate.result }}" == "success" ]]; then
            echo "- Generate & Validate: passed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Generate & Validate: ${{ needs.generate-validate.result }}" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "${{ needs.deploy-to-device.result }}" == "success" ]]; then
            echo "- Deploy to Device: passed" >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.deploy-to-device.result }}" == "skipped" ]]; then
            echo "- Deploy to Device: skipped (not requested)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Deploy to Device: ${{ needs.deploy-to-device.result }}" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "${{ needs.generate-validate.result }}" == "failure" ]]; then
            echo ""
            echo "Template generation tests failed."
            exit 1
          fi

          if [[ "${{ needs.deploy-to-device.result }}" == "failure" ]]; then
            echo ""
            echo "Template deploy tests failed."
            exit 1
          fi
