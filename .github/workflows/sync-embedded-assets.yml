name: Sync Embedded Assets

on:
  workflow_dispatch:
  schedule:
    # Run nightly to pick up skills updates.
    - cron: "0 3 * * *"

jobs:
  sync:
    name: Sync docs and skills into binary assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out wendyos
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.WENDY_TEMPLATE_SYNC_TOKEN }}

      - name: Check out claude-skills
        uses: actions/checkout@v4
        with:
          repository: wendylabsinc/claude-skills
          token: ${{ secrets.WENDY_TEMPLATE_SYNC_TOKEN }}
          path: _skills_src

      - name: Sync docs
        run: |
          DOCS_DST=go/internal/cli/assets/docs
          DOCS_SRC=docs
          rm -rf "$DOCS_DST"
          mkdir -p "$DOCS_DST"
          rsync -a \
            --exclude='.git' \
            --exclude='superpowers/' \
            --exclude='operations/' \
            --exclude='security/' \
            --exclude='.github/' \
            --exclude='.claude/' \
            --exclude='*.json' \
            "$DOCS_SRC/" "$DOCS_DST/"
          echo "Synced $(find "$DOCS_DST" -name '*.md' | wc -l) markdown doc files"

      - name: Sync skills
        run: |
          SKILLS_DST=go/internal/cli/assets/skills
          SKILLS_SRC=_skills_src
          rm -rf "$SKILLS_DST"
          mkdir -p "$SKILLS_DST"
          cp "$SKILLS_SRC/.claude-plugin/marketplace.json" "$SKILLS_DST/marketplace.json"
          for skill in wendy wendy-lite wendy-contributing wendy-swift swift swift-concurrency \
                       swift-nio swift-library-design swift-valkey postgres-nio hummingbird \
                       deckset linear database-driver-design; do
            if [ -d "$SKILLS_SRC/$skill" ]; then
              rsync -a --exclude='.DS_Store' "$SKILLS_SRC/$skill/" "$SKILLS_DST/$skill/"
            fi
          done
          echo "Synced $(find "$SKILLS_DST" -type f | wc -l) skill files"

      - name: Open PR if changed
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.WENDY_TEMPLATE_SYNC_TOKEN }}
          branch: chore/sync-embedded-assets
          title: "chore: sync embedded docs and skills"
          body: |
            Automated sync of embedded documentation and skill files from:
            - `wendylabsinc/claude-skills`
            - in-repo `docs/`
          commit-message: "chore: sync embedded docs and skills"
          base: main
          delete-branch: true
