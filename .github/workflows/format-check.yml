name: Swift Format Check and Fix

on:
  pull_request:
    branches: [main]
permissions:
  pull-requests: write 
jobs:
  format-check:
    name: Swift Format Check
    runs-on: [self-hosted, Linux, X64]
    container: swift:6.2.0

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Run Swift Format Check
        id: format_check
        run: |
          set -o pipefail
          swift format lint --recursive --strict Sources 2>&1 | tee format_output.txt
          status=${PIPESTATUS[0]}
          {
            echo "lint_output<<'EOF'"
            cat format_output.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          exit $status
        continue-on-error: true

      - name: Comment on PR
        if: steps.format_check.outcome != 'success'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const lintOutput = `${{ steps.format_check.outputs.lint_output }}`.trim();
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Swift Format Check Failed
            
            The Swift formatter found issues with your code. Please run the following command to fix them:
            
            \`\`\`
            swift format --recursive --in-place Sources
            \`\`\`
            
            <details>
            <summary>Formatting issues</summary>
            
            \`\`\`
            ${lintOutput}
            \`\`\`
            
            </details>
            
            Then commit and push the changes.`
            });

      - name: Fail Workflow
        if: steps.format_check.outcome != 'success'
        run: exit 1
