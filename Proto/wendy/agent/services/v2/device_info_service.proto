syntax = "proto3";
package wendy.agent.services.v2;
option go_package = "github.com/wendylabsinc/wendy/proto/gen/agentpb/v2;agentpbv2";

service WendyDeviceInfoService {
    rpc GetDeviceInfo(GetDeviceInfoRequest) returns (GetDeviceInfoResponse);
    rpc ListHardwareCapabilities(ListHardwareCapabilitiesRequest) returns (ListHardwareCapabilitiesResponse);
}

message GetDeviceInfoRequest {}

message GetDeviceInfoResponse {
    string version = 1;
    optional string os_version = 2;
    string os = 3;
    string cpu_architecture = 4;
    optional string public_key = 5;
    repeated string featureset = 6;
    optional string device_type = 7;
    optional bool has_gpu = 8;
    optional string gpu_vendor = 9;
    optional string jetpack_version = 10;
    optional string cuda_version = 11;
    optional int64 disk_used_bytes = 12;
    optional int64 disk_total_bytes = 13;
    // Usage for every real (disk-backed) filesystem mounted on the device. The
    // root filesystem is included here as well; disk_used_bytes/disk_total_bytes
    // are retained for backwards compatibility. Empty when the agent cannot
    // enumerate mounts.
    repeated DiskPartition partitions = 14;
    // GPU architecture identifier. Format is vendor-specific (e.g. "sm_87" for NVIDIA).
    optional string gpu_arch = 15;
    // Total physical memory (RAM) in bytes, from /proc/meminfo. Zero when the
    // agent cannot read it (a real host never has 0 bytes of RAM).
    int64 mem_total_bytes = 16;
    // Number of online logical CPU cores, from /proc/stat. Zero when the
    // agent cannot read it.
    uint32 cpu_count = 17;
}

// Usage information for a single mounted filesystem.
message DiskPartition {
    // Mount point (e.g. "/", "/boot", "/data").
    string mountpoint = 1;
    // Filesystem type (e.g. "ext4", "vfat").
    string filesystem = 2;
    // Backing block device (e.g. "/dev/mmcblk0p2").
    string device = 3;
    // Bytes currently used on the filesystem.
    int64 used_bytes = 4;
    // Total bytes on the filesystem.
    int64 total_bytes = 5;
}

message ListHardwareCapabilitiesRequest {
    optional string category_filter = 1;
}

message ListHardwareCapabilitiesResponse {
    repeated HardwareCapability capabilities = 1;

    message HardwareCapability {
        string category = 1;
        string device_path = 2;
        string description = 3;
        map<string, string> properties = 4;
    }
}
