syntax = "proto3";
package wendy.agent.services.v2;
option go_package = "github.com/wendylabsinc/wendy/proto/gen/agentpb/v2;agentpbv2";

// ROS2Service exposes live ROS 2 inspection of containers that carry the
// sh.wendy/entitlement.ros2 label (WDY-1332). The agent execs `ros2`
// commands inside a dedicated CLI sidecar container that shares the DDS
// domain (and network namespace) of the app's ROS 2 containers, so no ROS
// tooling is required inside app images.
service ROS2Service {
    // Unary inspection commands.
    rpc ListNodes(ListROS2NodesRequest) returns (ListROS2NodesResponse);
    rpc ListTopics(ListROS2TopicsRequest) returns (ListROS2TopicsResponse);
    rpc GetTopicInfo(GetROS2TopicInfoRequest) returns (GetROS2TopicInfoResponse);
    rpc ListServices(ListROS2ServicesRequest) returns (ListROS2ServicesResponse);
    rpc ListParams(ListROS2ParamsRequest) returns (ListROS2ParamsResponse);
    rpc GetParam(GetROS2ParamRequest) returns (GetROS2ParamResponse);
    rpc SetParam(SetROS2ParamRequest) returns (SetROS2ParamResponse);
    rpc CallService(CallROS2ServiceRequest) returns (CallROS2ServiceResponse);
    rpc GetGraph(GetROS2GraphRequest) returns (GetROS2GraphResponse);
    rpc Doctor(ROS2DoctorRequest) returns (ROS2DoctorResponse);

    // Server streaming — continuous observations until the client cancels.
    rpc EchoTopic(EchoROS2TopicRequest) returns (stream ROS2Message);
    rpc MonitorHz(MonitorROS2HzRequest) returns (stream ROS2HzSample);

    // Bidi — controllable bag record/stop session.
    rpc RecordBag(stream RecordROS2BagRequest) returns (stream RecordROS2BagResponse);

    // Bag management. Bags are recorded to /var/wendy/ros2-bags on the
    // device; DownloadBag streams a tar archive of the bag directory.
    rpc ListBags(ListROS2BagsRequest) returns (ListROS2BagsResponse);
    rpc DownloadBag(DownloadROS2BagRequest) returns (stream ROS2BagChunk);

    // Escape hatch — raw `ros2` CLI passthrough.
    rpc Exec(ROS2ExecRequest) returns (stream ROS2ExecOutput);

    // Actions — list/inspect action graphs and dispatch goals (WDY-1722).
    rpc ListActions(ListROS2ActionsRequest) returns (ListROS2ActionsResponse);
    rpc GetActionInfo(GetROS2ActionInfoRequest) returns (GetROS2ActionInfoResponse);
    // SendActionGoal streams feedback/result until the goal finishes or the
    // client cancels; output frames reuse ROS2ExecOutput.
    rpc SendActionGoal(SendROS2ActionGoalRequest) returns (stream ROS2ExecOutput);

    // Lifecycle — managed-node state inspection and transitions (WDY-1722).
    rpc ListLifecycleNodes(ListROS2LifecycleNodesRequest) returns (ListROS2LifecycleNodesResponse);
    rpc GetLifecycleState(GetROS2LifecycleStateRequest) returns (GetROS2LifecycleStateResponse);
    rpc ListLifecycleTransitions(ListROS2LifecycleTransitionsRequest) returns (ListROS2LifecycleTransitionsResponse);
    rpc SetLifecycleState(SetROS2LifecycleStateRequest) returns (SetROS2LifecycleStateResponse);

    // Components — composable-node container management (WDY-1722).
    rpc ListComponents(ListROS2ComponentsRequest) returns (ListROS2ComponentsResponse);
    rpc LoadComponent(LoadROS2ComponentRequest) returns (LoadROS2ComponentResponse);
    rpc UnloadComponent(UnloadROS2ComponentRequest) returns (UnloadROS2ComponentResponse);
}

message ROS2Node {
    string name = 1;
    string namespace = 2;
    // rmw identifies which RMW graph this node came from when a device runs
    // apps on more than one RMW (WDY-1594). Empty on single-RMW devices.
    string rmw = 3;
}

message ROS2Topic {
    string name = 1;
    repeated string types = 2; // a topic can have multiple publisher types
    int32 publisher_count = 3;
    int32 subscriber_count = 4;
    // rmw identifies which RMW graph this topic came from (WDY-1594). Empty on
    // single-RMW devices.
    string rmw = 5;
}

message ListROS2NodesRequest {
    optional int32 domain_id = 1; // override; default from container labels
}

message ListROS2NodesResponse {
    repeated ROS2Node nodes = 1;
}

message ListROS2TopicsRequest {
    optional int32 domain_id = 1;
    // When true, publisher/subscriber counts are populated (one extra
    // `ros2 topic info` round-trip per topic on the device).
    bool include_counts = 2;
}

message ListROS2TopicsResponse {
    repeated ROS2Topic topics = 1;
}

message GetROS2TopicInfoRequest {
    optional int32 domain_id = 1;
    string topic = 2;
}

message GetROS2TopicInfoResponse {
    ROS2Topic topic = 1;
    // Verbose `ros2 topic info -v` output including per-endpoint QoS profiles.
    string verbose = 2;
}

message ListROS2ServicesRequest {
    optional int32 domain_id = 1;
}

message ListROS2ServicesResponse {
    message Service {
        string name = 1;
        repeated string types = 2;
        // rmw identifies which RMW graph this service came from (WDY-1594).
        string rmw = 3;
    }
    repeated Service services = 1;
}

message ListROS2ParamsRequest {
    optional int32 domain_id = 1;
    string node = 2; // empty = all nodes
}

message ListROS2ParamsResponse {
    message NodeParams {
        string node = 1;
        repeated string params = 2;
    }
    repeated NodeParams nodes = 1;
}

message GetROS2ParamRequest {
    optional int32 domain_id = 1;
    string node = 2;
    string param = 3;
}

message GetROS2ParamResponse {
    string value = 1; // YAML representation
}

message SetROS2ParamRequest {
    optional int32 domain_id = 1;
    string node = 2;
    string param = 3;
    string value = 4;
}

message SetROS2ParamResponse {
    bool success = 1;
    string message = 2;
}

message CallROS2ServiceRequest {
    optional int32 domain_id = 1;
    string service = 2;
    string type = 3;
    string request = 4; // YAML/JSON request payload
}

message CallROS2ServiceResponse {
    bool success = 1;
    string response = 2; // YAML response payload or error message
}

message GetROS2GraphRequest {
    optional int32 domain_id = 1;
}

message GetROS2GraphResponse {
    message Edge {
        string node = 1;  // fully-qualified node name
        string topic = 2;
        string rmw = 3;   // RMW graph this edge belongs to (WDY-1594); "" single-RMW
    }
    repeated ROS2Node nodes = 1;
    repeated Edge publishes = 2;  // node publishes to topic
    repeated Edge subscribes = 3; // node subscribes to topic
}

message ROS2DoctorRequest {
    optional int32 domain_id = 1;
}

message ROS2DoctorResponse {
    string report = 1;
}

message EchoROS2TopicRequest {
    optional int32 domain_id = 1;
    string topic = 2;
    int32 count = 3; // 0 = stream until cancelled
}

message ROS2Message {
    string topic = 1;
    string yaml = 2;
}

message MonitorROS2HzRequest {
    optional int32 domain_id = 1;
    string topic = 2;
}

message ROS2HzSample {
    double hz = 1;
    double min_delta = 2;
    double max_delta = 3;
    double std_dev = 4;
    int32 window = 5;
}

message RecordROS2BagRequest {
    oneof command {
        RecordStart start = 1;
        RecordStop stop = 2;
    }
    message RecordStart {
        optional int32 domain_id = 1;
        repeated string topics = 2; // empty = record all
        string output_name = 3;     // empty = auto-named with timestamp
    }
    message RecordStop {}
}

message RecordROS2BagResponse {
    enum State {
        STATE_UNSPECIFIED = 0;
        STATE_RECORDING = 1;
        STATE_STOPPED = 2;
        STATE_ERROR = 3;
    }
    State state = 1;
    string bag_name = 2;
    string message = 3;
}

message ListROS2BagsRequest {}

message ListROS2BagsResponse {
    message Bag {
        string name = 1;
        int64 size_bytes = 2;
        int64 created_unix = 3;
        double duration_seconds = 4; // 0 when metadata is unavailable
    }
    repeated Bag bags = 1;
}

message DownloadROS2BagRequest {
    string name = 1;
}

message ROS2BagChunk {
    bytes data = 1; // tar archive stream of the bag directory
}

message ROS2ExecRequest {
    optional int32 domain_id = 1;
    repeated string args = 2; // arguments after `ros2`
}

message ROS2ExecOutput {
    bytes stdout = 1;
    bytes stderr = 2;
    optional int32 exit_code = 3; // set on the final message
}

// --- Actions (WDY-1722) ---

message ROS2Action {
    string name = 1;
    repeated string types = 2; // an action can advertise multiple types
    // rmw identifies which RMW graph this action came from (WDY-1594). Empty on
    // single-RMW devices.
    string rmw = 3;
}

message ListROS2ActionsRequest {
    optional int32 domain_id = 1;
}

message ListROS2ActionsResponse {
    repeated ROS2Action actions = 1;
}

message GetROS2ActionInfoRequest {
    optional int32 domain_id = 1;
    string action = 2;
}

message GetROS2ActionInfoResponse {
    string name = 1;
    repeated string action_clients = 2; // fully-qualified client node names
    repeated string action_servers = 3; // fully-qualified server node names
    // Verbose raw `ros2 action info` output.
    string verbose = 4;
}

message SendROS2ActionGoalRequest {
    optional int32 domain_id = 1;
    string action = 2;
    string action_type = 3; // e.g. action_tutorials_interfaces/action/Fibonacci
    string goal = 4;        // YAML goal payload
    bool feedback = 5;      // forward --feedback to stream feedback messages
}

// --- Lifecycle / managed nodes (WDY-1722) ---

message ROS2LifecycleTransition {
    string label = 1; // e.g. "configure"
    uint32 id = 2;
    string start_state = 3;
    string goal_state = 4;
}

message ListROS2LifecycleNodesRequest {
    optional int32 domain_id = 1;
}

message ListROS2LifecycleNodesResponse {
    repeated ROS2Node nodes = 1;
}

message GetROS2LifecycleStateRequest {
    optional int32 domain_id = 1;
    string node = 2;
}

message GetROS2LifecycleStateResponse {
    string state = 1;     // e.g. "unconfigured", "inactive", "active"
    uint32 state_id = 2;  // numeric state id (e.g. 1)
}

message ListROS2LifecycleTransitionsRequest {
    optional int32 domain_id = 1;
    string node = 2;
}

message ListROS2LifecycleTransitionsResponse {
    repeated ROS2LifecycleTransition transitions = 1;
}

message SetROS2LifecycleStateRequest {
    optional int32 domain_id = 1;
    string node = 2;
    string transition = 3; // e.g. "configure", "activate"
}

message SetROS2LifecycleStateResponse {
    bool success = 1;
    string message = 2;
}

// --- Components / composable nodes (WDY-1722) ---

message ROS2LoadedComponent {
    uint32 uid = 1;  // unique id within the container
    string name = 2; // fully-qualified node name
}

message ROS2ComponentContainer {
    string name = 1; // container node name, e.g. /ComponentManager
    repeated ROS2LoadedComponent components = 2;
    // rmw identifies which RMW graph this container came from (WDY-1594).
    string rmw = 3;
}

message ListROS2ComponentsRequest {
    optional int32 domain_id = 1;
}

message ListROS2ComponentsResponse {
    repeated ROS2ComponentContainer containers = 1;
}

message LoadROS2ComponentRequest {
    optional int32 domain_id = 1;
    string container = 2; // container node name
    string package = 3;
    string plugin = 4;    // plugin class, e.g. composition::Talker
}

message LoadROS2ComponentResponse {
    uint32 uid = 1;
    string node_name = 2;
    string message = 3;
}

message UnloadROS2ComponentRequest {
    optional int32 domain_id = 1;
    string container = 2;
    uint32 uid = 3;
}

message UnloadROS2ComponentResponse {
    string message = 1;
}
