<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <rect width="1440" height="900" fill="#171717"/>

  <g font-family="JetBrains Mono, JetBrainsMono, JetBrainsMono Nerd Font, JetBrainsMono Nerd Font Mono, ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="start">
    <g transform="translate(112 0)">
      <text x="0" y="410" font-size="74" font-weight="700" fill="#F5F5F5">{{TITLE}}</text>
      <text x="0" y="474" font-size="34" font-weight="400" fill="#D4D4D4">{{SUBTITLE}}</text>
    </g>

    <g transform="translate(112 770)" font-size="24" font-weight="400" fill="#A3A3A3">
      <text x="0" y="0">{{AUTHOR}}</text>
      <text x="0" y="42">{{PLACE}}</text>
      <text x="0" y="84">{{DATE}}</text>
    </g>
  </g>
</svg>
